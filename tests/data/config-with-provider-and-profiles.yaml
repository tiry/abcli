# Test config: base has data_provider: direct, profiles don't override it
client_id: "default-client-id"
client_secret: "default-secret"
api_endpoint: "https://api.default.com"
auth_endpoint: "https://auth.default.com"

# Base UI config with direct provider
ui:
  data_provider: "direct"

# Profiles override API settings but NOT the UI provider
profiles:
  staging:
    client_id: "staging-client-id"
    client_secret: "staging-secret"
    api_endpoint: "https://api.staging.com"
    auth_endpoint: "https://auth.staging.com"
    # NOTE: ui.data_provider is NOT overridden - should inherit "direct" from base
  
  dev:
    client_id: "dev-client-id"
    client_secret: "dev-secret"
    api_endpoint: "https://api.dev.com"
    auth_endpoint: "https://auth.dev.com"
    # NOTE: ui.data_provider is NOT overridden - should inherit "direct" from base
