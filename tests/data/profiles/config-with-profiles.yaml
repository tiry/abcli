# Test configuration file with profiles
client_id: "default-client-id"
client_secret: "default-client-secret"
api_endpoint: "https://api.default.example.com/"
auth_endpoint: "https://auth.default.example.com/token"
timeout: 30.0
max_retries: 3
default_output_format: "table"

# Pagination settings
pagination:
  max_filter_pages: 10

# UI settings
ui:
  data_provider: "cli"
  mock_data_dir: null

# Profiles for different environments
profiles:
  dev:
    client_id: "dev-client-id"
    client_secret: "dev-client-secret"
    api_endpoint: "https://api.dev.example.com/"
    auth_endpoint: "https://auth.dev.example.com/token"
    timeout: 60.0
    
  staging:
    client_id: "staging-client-id"
    client_secret: "staging-client-secret"
    api_endpoint: "https://api.staging.example.com/"
    auth_endpoint: "https://auth.staging.example.com/token"
    max_retries: 5
    
  prod:
    client_id: "prod-client-id"
    client_secret: "prod-client-secret"
    api_endpoint: "https://api.prod.example.com/"
    auth_endpoint: "https://auth.prod.example.com/token"
    timeout: 45.0
    max_retries: 5
    default_output_format: "json"
